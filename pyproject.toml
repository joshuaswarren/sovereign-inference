# Sovereign Inference — Python workspace root (uv virtual workspace).
# Each member package has its own pyproject.toml. Shared dev tooling and
# lint/type/test configuration live here and apply repo-wide.

[tool.uv.workspace]
members = [
    "packages/*",
    "adapters/runtime-ollama",
    "adapters/runtime-llamacpp",
    "adapters/runtime-vllm",
    "apps/router-demo",
]

[dependency-groups]
dev = [
    "pytest>=8.2",
    "pytest-cov>=5.0",
    "mypy>=1.10",
    "ruff>=0.6",
    "types-jsonschema",
    "types-psutil",
    "respx>=0.21",
]

# ---- Ruff (lint + format + import sorting) ----
[tool.ruff]
line-length = 120
target-version = "py312"
src = ["packages", "adapters"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM", "PTH", "RUF"]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.lint.isort]
known-first-party = ["sip_protocol", "sip_receipts", "sip_pic", "sip_gateway", "sip_router", "sip_router_demo", "sin_node", "sin_cli"]

# ---- mypy (strict typing per project standards) ----
[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_untyped_defs = true
no_implicit_optional = true
show_error_codes = true
exclude = ["build/", "dist/"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

# ---- pytest + coverage ----
[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["packages", "adapters", "apps/router-demo"]
addopts = "-ra -q --import-mode=importlib"

[tool.coverage.run]
branch = true
source = ["sip_protocol", "sip_receipts", "sip_pic", "sip_gateway", "sip_router", "sip_router_demo", "sin_node", "sin_cli"]

[tool.coverage.report]
show_missing = true
skip_covered = false
