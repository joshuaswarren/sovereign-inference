name: python

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync workspace
        run: uv sync --all-extras --dev
      - name: Audit dependencies (pip-audit, advisory)
        continue-on-error: true
        run: uv run --with pip-audit pip-audit
      - name: Generate SBOM (CycloneDX)
        run: uv run --with cyclonedx-bom cyclonedx-py environment -o sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: warn

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-extras --dev

      - name: Ruff format check
        run: uv run ruff format --check packages adapters apps

      - name: Ruff lint
        run: uv run ruff check packages adapters apps

      - name: mypy (typed libraries)
        run: uv run mypy packages/sip-protocol/src packages/receipt-verifier/src packages/sin-node/src packages/sin-cli/src packages/compute/src packages/arweave-anchor/src packages/discovery/src packages/reputation/src packages/pic-vouchers/src packages/policy/src packages/plugins/src adapters/runtime-ollama/src adapters/runtime-llamacpp/src adapters/provider-nosana/src adapters/provider-akash/src apps/router-demo/src apps/directory-service/src apps/relay/src apps/openai-proxy/src

      - name: Tests
        run: uv run pytest --cov --cov-report=term-missing

      - name: Receipt CLI smoke test (sign → verify → tamper)
        shell: bash
        run: |
          uv run sip-receipt demo > receipt.json
          uv run sip-receipt verify receipt.json
          python -c "import json;d=json.load(open('receipt.json'));d['output_tokens']=1;json.dump(d,open('receipt.json','w'))"
          if uv run sip-receipt verify receipt.json; then
            echo "ERROR: tampered receipt verified — signature check is broken"; exit 1
          else
            echo "OK: tampered receipt correctly rejected"
          fi

      - name: SIN CLI smoke test (scan + recommend)
        shell: bash
        run: |
          uv run sin scan --json | python -c "import json,sys; d=json.load(sys.stdin); assert 'accelerator' in d; print('scan ok:', d['accelerator'])"
          uv run sin recommend --task coding --top 3 --json | python -c "import json,sys; r=json.load(sys.stdin); assert len(r) >= 1; print('recommend ok:', len(r), 'results')"

      - name: Decentralized demo smoke test (provision → anchor → route → verify)
        run: uv run sip-decentralized-demo

      - name: Discovery demo smoke test (announce → discover → route → verify)
        run: uv run sip-discovery-demo

      - name: Supply demo smoke test (hosted directory + reputation + re-announce)
        run: uv run sip-supply-demo

      - name: Privacy demo smoke test (attestation + blind credit + relay)
        run: uv run sip-privacy-demo

      - name: Share publish smoke test (sin share --no-serve → discoverable manifest)
        shell: bash
        run: |
          uv run sin share --runtime ollama --model qwen-coder-7b \
            --advertised-url http://ci-node:8090 --no-serve \
            --manifest-out manifest.json --directory providers.json
          python -c "import json,sys; m=json.load(open('manifest.json')); assert m['node_type']=='sovereign-node'; assert m['manifest_uri']=='http://ci-node:8090'; print('share manifest ok')"
