name: js

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck SDK
        run: pnpm --filter @sovereign-inference/sdk typecheck

      - name: Build SDK
        run: pnpm --filter @sovereign-inference/sdk build

      - name: Typecheck dashboard
        run: pnpm --filter @sovereign-inference/dashboard typecheck

      - name: Build dashboard
        run: pnpm --filter @sovereign-inference/dashboard build
