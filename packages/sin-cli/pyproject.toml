[project]
name = "sin-cli"
version = "0.1.2"
description = "The `sin` command-line interface for the Sovereign Inference Node."
readme = "README.md"
requires-python = ">=3.12"
license = "AGPL-3.0-or-later"
authors = [{ name = "Joshua Warren" }]
dependencies = [
    "sin-node",
    "sip-runtime-ollama",
    "sip-runtime-llamacpp",
    "sip-receipts",
    "rich>=13.7",
]

[project.scripts]
sin = "sin_cli.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sin_cli"]

[tool.uv.sources]
sin-node = { workspace = true }
sip-runtime-ollama = { workspace = true }
sip-runtime-llamacpp = { workspace = true }
sip-receipts = { workspace = true }
