[project]
name = "sip-arweave"
version = "0.1.2"
description = "Anchor SIP-AI manifests and receipts to permanent storage (Arweave), with a local offline anchor for tests and demos."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Joshua Warren" }]
dependencies = ["sip-protocol", "httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sip_arweave"]

[tool.uv.sources]
sip-protocol = { workspace = true }
