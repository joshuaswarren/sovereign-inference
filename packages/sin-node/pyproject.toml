[project]
name = "sin-node"
version = "0.1.2"
description = "Sovereign Inference Node: hardware profiling, model advisor, local serving, benchmarking, and capacity sharing."
readme = "README.md"
requires-python = ">=3.12"
license = "AGPL-3.0-or-later"
authors = [{ name = "Joshua Warren" }]
dependencies = [
    "sip-protocol",
    "psutil>=6.0",
    "httpx>=0.27",
    "pydantic>=2.6",
    "rich>=13.7",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sin_node"]

[tool.uv.sources]
sip-protocol = { workspace = true }
