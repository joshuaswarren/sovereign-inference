[project]
name = "sip-pic"
version = "0.1.2"
description = "Private Inference Credits (PIC): issuance, redemption, double-spend prevention, and settlement, plus an x402 direct-pay path."
readme = "README.md"
requires-python = ">=3.12"
license = "AGPL-3.0-or-later"
authors = [{ name = "Joshua Warren" }]
dependencies = ["sip-protocol"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sip_pic"]

[tool.uv.sources]
sip-protocol = { workspace = true }
