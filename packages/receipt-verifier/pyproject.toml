[project]
name = "sip-receipts"
version = "0.1.2"
description = "sip-receipt: command-line tool to generate keys, sign, and verify Sovereign Inference signed receipts."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Joshua Warren" }]
dependencies = ["sip-protocol"]

[project.scripts]
sip-receipt = "sip_receipts.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sip_receipts"]

[tool.uv.sources]
sip-protocol = { workspace = true }
