[project]
name = "sip-plugins"
version = "0.1.2"
description = "Plugin SDK for Sovereign Inference: discover and register third-party runtime adapters, compute providers, and directories via Python entry points."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Joshua Warren" }]
dependencies = ["sin-node", "sip-compute"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sip_plugins"]

[tool.uv.sources]
sin-node = { workspace = true }
sip-compute = { workspace = true }
