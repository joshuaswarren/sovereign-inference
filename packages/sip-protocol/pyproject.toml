[project]
name = "sip-protocol"
version = "0.1.2"
description = "Shared Sovereign Inference Protocol primitives: canonical JSON, Ed25519 signing, model/provider manifests, signed inference receipts, and JSON Schema validation."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Joshua Warren" }]
keywords = ["ai", "inference", "decentralized", "ed25519", "open-models"]
dependencies = [
    "cryptography>=42.0",
    "jsonschema>=4.21",
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sip_protocol"]
