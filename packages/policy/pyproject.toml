[project]
name = "sip-policy"
version = "0.1.2"
description = "Provider-selection policy for SIP-AI: govern routing by required attestation, price caps, privacy modes, allow/deny lists, and minimum reputation."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Joshua Warren" }]
dependencies = ["sip-protocol"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sip_policy"]

[tool.uv.sources]
sip-protocol = { workspace = true }
