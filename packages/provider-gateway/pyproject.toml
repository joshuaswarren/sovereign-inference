[project]
name = "sip-provider-gateway"
version = "0.1.2"
description = "Hardened provider gateway: auth, quotas, policy, payment validation, and receipt generation in front of a model runtime."
readme = "README.md"
requires-python = ">=3.12"
license = "AGPL-3.0-or-later"
authors = [{ name = "Joshua Warren" }]
dependencies = [
    "sip-protocol",
    "sip-pic",
    "sin-node",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sip_gateway"]

[tool.uv.sources]
sip-protocol = { workspace = true }
sip-pic = { workspace = true }
sin-node = { workspace = true }
