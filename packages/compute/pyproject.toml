[project]
name = "sip-compute"
version = "0.1.2"
description = "Shared compute-provider contract for external decentralized compute (Nosana, Akash): deploy, status, endpoint, teardown, and signed provider-manifest helpers."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Joshua Warren" }]
dependencies = ["sip-protocol"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sip_compute"]

[tool.uv.sources]
sip-protocol = { workspace = true }
